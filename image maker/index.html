// Style variants used when the API exposes only one model — keeps outputs clearly different.
const STYLE_VARIANTS = [
    { label: 'Balanced', desc: 'General purpose', suffix: '' },
    { label: 'Photoreal', desc: 'Sharp, natural', suffix: ', photorealistic, 8k uhd, detailed texture, natural lighting, shot on full frame' },
    { label: 'Anime', desc: 'Illustration', suffix: ', anime style, clean line art, vibrant colors, cel shading, high detail' },
    { label: '3D render', desc: 'CGI look', suffix: ', 3d render, octane render, studio lighting, subsurface scattering, highly detailed' },
    { label: 'Cinematic', desc: 'Film still', suffix: ', cinematic composition, dramatic lighting, film grain, wide angle, color graded' },
    { label: 'Oil paint', desc: 'Fine art', suffix: ', oil painting, visible brush strokes, rich impasto, museum quality' }
];

    name: v.label,

const RANDOM_PROMPTS = [
    "A majestic white lion with golden mane, wearing royal armor, cinematic lighting, 8k",
    "Cyberpunk street market in Tokyo, neon signs, rainy night, synthwave aesthetic",
    "Floating islands with waterfalls in a purple nebula sky, bioluminescent plants",
    "An astronaut sitting on a park bench on Mars, reading a newspaper, Earth in sky",

    "A cute baby dragon made of glass, breathing blue fire, macro photography",

    "Portrait of a futuristic samurai, chrome armor, katana glowing with blue energy",

    "A cozy library with books flying around, magical golden dust, Ghibli style"
];

const delay = ms => new Promise(res => setTimeout(res, ms));

function newCreationId() {
    return `c-${Date.now()}-${Math.random().toString(36).slice(2, 11)}`;
}

/** Resize large uploads so vision + URLs stay reliable in the browser */
function fileToResizedDataUrl(file, maxSide = 1280) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
            URL.revokeObjectURL(url);
            let { width, height } = img;
            if (width <= maxSide && height <= maxSide) {
                const c = document.createElement('canvas');
                c.width = width;
                c.height = height;
                c.getContext('2d').drawImage(img, 0, 0);
                resolve(c.toDataURL('image/jpeg', 0.92));
                return;
            }
            const scale = maxSide / Math.max(width, height);
            width = Math.round(width * scale);
            height = Math.round(height * scale);
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.92));
        };
        img.onerror = () => {
            URL.revokeObjectURL(url);
            reject(new Error('Could not read image'));
        };
        img.src = url;
    });
}

/** Describe the reference image so text-to-image can follow it (Pollinations vision API). */
async function analyzeReferenceImage(dataUrl) {
    const payload = {
        model: 'openai',
        messages: [{
            role: 'user',
            content: [
                {
                    type: 'text',
                    text: 'You help an image generator. Describe ONLY what is visible in this image: main subjects, poses, colors, materials, lighting, background, art style, and composition. Be concrete. No preamble — max 1200 characters.'
                },
                { type: 'image_url', image_url: { url: dataUrl } }
            ]
        }],
        max_tokens: 500,
        temperature: 0.3
    };
    const res = await fetch('https://text.pollinations.ai/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('Vision request failed');
    const data = await res.json();
    const text = data.choices?.[0]?.message?.content?.trim();
    if (!text) throw new Error('No vision description');
    // If Pollinations returns a deprecation banner instead of a description, ignore it
    const lower = text.toLowerCase();
    if (lower.includes('legacy text api is being deprecated') || lower.includes('important notice')) {
        throw new Error('Got pollinations notice instead of vision description');
    }
    return text;
}

async function resolvePipelineModels() {
    try {
        const res = await fetch('https://image.pollinations.ai/models', { cache: 'no-store' });
        if (!res.ok) throw new Error('models');
        const list = await res.json();
        if (!Array.isArray(list) || list.length === 0) throw new Error('empty');

        if (list.length === 1) {
            const mid = list[0];
            return STYLE_VARIANTS.map((v, idx) => ({
                id: mid,
                name: `${String(mid).toUpperCase()} · ${v.label}`,
                desc: v.desc,
                promptSuffix: v.suffix,
                variantKey: `v-${idx}`
            }));
        }

        const take = list.slice(0, 6);
        return take.map((id, idx) => ({
            id,
            name: String(id).replace(/-/g, ' ').toUpperCase(),
            desc: 'Active model',
            promptSuffix: '',
            variantKey: `m-${idx}`
        }));
    } catch {
        return FALLBACK_PIPELINE;
    }
}

function buildImageUrl(prompt, modelId, w, h, seed) {
    const cb = `${Date.now()}-${Math.random().toString(36).slice(2)}`;
    const base = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;
    const q = new URLSearchParams({
        width: String(w),
        height: String(h),
        model: modelId,
        seed: String(seed),
        nologo: 'true',
        enhance: 'false',
        cb
    });
    return `${base}?${q.toString()}`;
}

function init() {
    const savedHistory = localStorage.getItem('imagen_history');
    if (savedHistory) {
        state.history = JSON.parse(savedHistory);
    }
    renderHistory();
    setupEventListeners();
    resolvePipelineModels().then(m => { state.pipelineModels = m; }).catch(() => {});
}

function setupEventListeners() {
    promptInput.addEventListener('input', (e) => { state.prompt = e.target.value; });

    ratioBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            ratioBtns.forEach(b => b.classList.remove('bg-indigo-500', 'text-white'));
            ratioBtns.forEach(b => b.classList.add('text-slate-400'));
            btn.classList.add('bg-indigo-500', 'text-white');
            btn.classList.remove('text-slate-400');
            state.aspectRatio = btn.dataset.ratio;
        });
    });

    uploadBtn.addEventListener('click', () => imageUpload.click());
    imageUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            if (state.refObjectUrl) URL.revokeObjectURL(state.refObjectUrl);
            state.refImage = file;
            state.refObjectUrl = URL.createObjectURL(file);
            refPreview.src = state.refObjectUrl;
            refPreview.classList.remove('hidden');
            uploadText.innerText = file.name;
            removeImage.classList.remove('hidden');
        }
    });

    removeImage.addEventListener('click', (e) => {
        e.stopPropagation();
        state.refImage = null;
        if (state.refObjectUrl) URL.revokeObjectURL(state.refObjectUrl);
        state.refObjectUrl = null;
        refPreview.src = '';
        refPreview.classList.add('hidden');
        imageUpload.value = '';
        uploadText.innerText = 'Upload Reference';
        removeImage.classList.add('hidden');
    });

    generateBtn.addEventListener('click', launchPipeline);

    randomPromptBtn.addEventListener('click', () => {
        const random = RANDOM_PROMPTS[Math.floor(Math.random() * RANDOM_PROMPTS.length)];
        promptInput.value = random;
        state.prompt = random;
        gsap.fromTo(promptInput, { opacity: 0.5 }, { opacity: 1, duration: 0.5 });
    });

    clearHistoryBtn.addEventListener('click', () => {
        state.history = [];
        localStorage.removeItem('imagen_history');
        renderHistory();
    });

    closeModal.addEventListener('click', () => imageModal.classList.remove('active'));
    imageModal.addEventListener('click', (e) => { if (e.target === imageModal) imageModal.classList.remove('active'); });

    resultsGrid.addEventListener('click', (e) => {
        const dl = e.target.closest('[data-action="download"]');
        if (dl && dl.dataset.url) {
            e.stopPropagation();
            downloadImage(dl.dataset.url, dl.dataset.filename || 'creation.jpg');
            return;
        }
        const card = e.target.closest('.creation-card[data-creation-id]');
        if (card) openModal(card.dataset.creationId);
    });
}

function getDimensions(ratio) {
    if (ratio === '16:9') return { w: 1280, h: 720 };
    if (ratio === '9:16') return { w: 720, h: 1280 };
    return { w: 1024, h: 1024 };
}

async function launchPipeline() {
    if (!state.prompt.trim()) { alert('Please enter a prompt!'); return; }
    if (state.isGenerating) return;

    state.isGenerating = true;
    updateBtnState(true);
    if (loadingOverlay) loadingOverlay.classList.remove('hidden');

    pipelineGrid.innerHTML = '';
    pipelineStatus.classList.remove('hidden');
    gsap.from(pipelineStatus, { opacity: 0, y: 20, duration: 0.5 });

    const models = await resolvePipelineModels();
    state.pipelineModels = models;

    let basePrompt = state.prompt.trim();

    if (state.refImage) {
        try {
            const dataUrl = await fileToResizedDataUrl(state.refImage);
            const desc = await analyzeReferenceImage(dataUrl);
            basePrompt = `${basePrompt}\n\nFollow this reference image closely. Reference details: ${desc}`;
        } catch (err) {
            console.warn('Vision analysis failed; continuing with prompt only', err);
            basePrompt = `${basePrompt}\n\n(Reference image attached — match its subject, palette, and layout as closely as possible.)`;
        }
    }

    const { w, h } = getDimensions(state.aspectRatio);
    const creations = new Array(models.length);

    const tasks = models.map((model, index) =>
        delay(index * 5000).then(async () => {
            const card = createPipelineCard(model);
            pipelineGrid.appendChild(card);
            lucide.createIcons({ attrs: { 'data-lucide': true }, scope: card });

            const progressBar = card.querySelector('.progress-bar');
            const statusText = card.querySelector('.status-text');
            const statusIcon = card.querySelector('.status-icon');

            const updateStatus = (percent, text) => {
                progressBar.style.width = `${percent}%`;
                statusText.innerText = text;
                updateGlobalPercentage();
            };

            updateStatus(15, 'QUEUED…');

            const finalPrompt = `${basePrompt}${model.promptSuffix || ''}`;
            const seed = Math.floor(Math.random() * 2147483647);
            const imageUrl = buildImageUrl(finalPrompt, model.id, w, h, seed);

            updateStatus(45, 'GENERATING…');

            try {
                await preloadImage(imageUrl);
            } catch {
                // Still store URL; on-screen handler may recover via proxy
            }

            updateStatus(100, 'DONE');
            statusIcon.innerHTML = '<i data-lucide="check-circle-2" class="w-3 h-3 text-green-400"></i>';
            lucide.createIcons({ scope: card });

            creations[index] = {
                id: newCreationId(),
                url: imageUrl,
                prompt: state.prompt,
                model: model.name,
                ratio: state.aspectRatio,
                timestamp: new Date().toLocaleString()
            };
        })
    );

    await Promise.all(tasks);

    const batch = creations.filter(Boolean);
    state.history = [...batch, ...state.history];
    localStorage.setItem('imagen_history', JSON.stringify(state.history.slice(0, 24)));
    renderHistory();

    state.isGenerating = false;
    updateBtnState(false);
    if (loadingOverlay) loadingOverlay.classList.add('hidden');
    setTimeout(() => pipelineStatus.classList.add('hidden'), 2000);
}

function createPipelineCard(model) {
    const card = document.createElement('div');
    card.className = 'bg-slate-900/40 border border-white/5 p-4 rounded-2xl flex flex-col gap-3 relative overflow-hidden group';
    card.innerHTML = `
        <div class="flex justify-between items-start">
            <div>
                <h4 class="text-[10px] font-black text-indigo-400 tracking-widest uppercase">${escapeHtml(model.name)}</h4>
                <p class="text-[8px] text-slate-500 font-bold">${escapeHtml(model.desc)}</p>
            </div>
            <div class="status-icon"><i data-lucide="loader-2" class="w-3 h-3 text-indigo-400 animate-spin"></i></div>
        </div>
        <div class="w-full bg-indigo-500/10 h-1 rounded-full overflow-hidden">
            <div class="progress-bar bg-indigo-500 h-full w-0 transition-all duration-300"></div>
        </div>
        <div class="text-[8px] font-mono text-slate-400 status-text italic">WAITING…</div>
    `;
    return card;
}

function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function escapeAttr(s) {
    return String(s)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;');
}

function preloadImage(url) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.referrerPolicy = 'no-referrer';
        img.onload = () => resolve();
        img.onerror = () => reject(new Error('load'));
        img.src = url;
    });
}

function updateGlobalPercentage() {
    const bars = document.querySelectorAll('.progress-bar');
    let total = 0;
    bars.forEach(bar => { total += parseInt(bar.style.width || '0', 10) || 0; });
    const avg = bars.length ? Math.round(total / bars.length) : 0;
    pipelinePercentage.innerText = `${avg}%`;
}

function updateBtnState(loading) {
    if (loading) {
        generateBtn.disabled = true;
        btnText.innerText = 'GENERATING…';
        generateBtn.classList.add('opacity-80', 'cursor-not-allowed', 'scale-[0.98]');
    } else {
        generateBtn.disabled = false;
        btnText.innerText = 'LAUNCH MULTI-AI PIPELINE';
        generateBtn.classList.remove('opacity-80', 'cursor-not-allowed', 'scale-[0.98]');
    }
}

function creationCardMarkup(item) {
    const sid = String(item.id);
    const safeIdAttr = escapeAttr(sid);
    const safeUrlAttr = escapeAttr(item.url);
    return `
        <div class="creation-card is-loading group relative bg-slate-900/50 rounded-[2rem] border border-white/5 overflow-hidden transition-all cursor-pointer box-border"
             id="card-${sid}"
             data-creation-id="${safeIdAttr}">
            <div class="loader-overlay absolute inset-0 flex items-center justify-center bg-slate-900/80 z-10 transition-opacity duration-500">
                <div class="flex flex-col items-center gap-3">
                    <div class="w-8 h-8 border-2 border-indigo-500/20 border-t-indigo-500 rounded-full animate-spin"></div>
                    <span class="text-[8px] font-black text-indigo-400 tracking-widest uppercase">Loading…</span>
                </div>
            </div>
            <img src="${escapeAttr(item.url)}" alt="AI Creation"
                 class="main-img w-full aspect-square object-cover opacity-0 transition-opacity duration-700 group-hover:scale-110"
                 referrerpolicy="no-referrer"
                 data-img-id="${safeIdAttr}"
                 onload="handleImgLoad(this, this.dataset.imgId)"
                 onerror="handleImgError(this, this.dataset.imgId)">
            <div class="absolute inset-x-0 bottom-0 p-6 bg-gradient-to-t from-black/90 via-black/40 to-transparent translate-y-4 group-hover:translate-y-0 opacity-0 group-hover:opacity-100 transition-all duration-300 z-20">
                <p class="text-white text-[10px] line-clamp-2 font-medium tracking-tight mb-4">${escapeHtml(item.prompt)}</p>
                <div class="flex items-center justify-between">
                    <span class="text-[9px] font-black tracking-[0.2em] text-indigo-400 uppercase bg-indigo-500/10 px-2 py-1 rounded-md border border-indigo-500/20">${escapeHtml(item.model)}</span>
                    <button type="button" data-action="download" data-url="${safeUrlAttr}" data-filename="${escapeAttr(`creation-${sid}.jpg`)}" class="p-2 bg-indigo-500 rounded-xl hover:bg-indigo-600 transition-colors shadow-lg shadow-indigo-500/20">
                        <i data-lucide="download" class="w-4 h-4 text-white"></i>
                    </button>
                </div>
            </div>
        </div>
    `;
}

function renderHistory() {
    if (state.history.length === 0) {
        resultsGrid.innerHTML = `
            <div class="col-span-full py-20 text-center space-y-4 opacity-50">
                <div class="w-20 h-20 bg-slate-900 mx-auto flex items-center justify-center border border-white/5 rounded-3xl">
                    <i data-lucide="image-plus" class="w-10 h-10"></i>
                </div>
                <p class="font-bold tracking-widest text-xs uppercase">The Canvas is Empty</p>
            </div>
        `;
        lucide.createIcons();
        return;
    }

    resultsGrid.innerHTML = state.history.map(item => creationCardMarkup(item)).join('');
    lucide.createIcons();
}

function handleImgLoad(img, id) {
    const card = document.getElementById(`card-${id}`);
    if (card) {
        card.classList.remove('is-loading');
        img.classList.remove('opacity-0');
        const loader = card.querySelector('.loader-overlay');
        if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 500);
        }
    }
}

async function handleImgError(img, id) {
    if (img.dataset.failed === 'true') return;
    img.dataset.failed = 'true';
    const errorSvg = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
            <rect width="100%" height="100%" fill="#0f172a"/>
            <text x="50%" y="48%" font-family="sans-serif" font-size="28" fill="#94a3b8" text-anchor="middle">Could not load image</text>
            <text x="50%" y="53%" font-family="sans-serif" font-size="22" fill="#475569" text-anchor="middle">Rate limit or network — try again shortly</text>
        </svg>
    `)}`;

    img.src = errorSvg;
    handleImgLoad(img, id);
}

function openModal(id) {
    const item = state.history.find(i => String(i.id) === String(id));
    if (!item) return;
    modalImage.src = item.url;
    modalImage.referrerPolicy = 'no-referrer';
    modalPrompt.innerText = item.prompt;
    modalEngine.innerText = item.model;
    modalDownload.onclick = () => downloadImage(item.url, `creation-${item.id}.jpg`);
    if (modalSend) {
        modalSend.onclick = () => {
            const params = new URLSearchParams(location.search);
            const jid = params.get('jid');
            if (!jid) {
                alert('Open this page from dashboard with ?jid=<whatsapp jid>');
                return;
            }
            const payload = {
                type: 'imagen_send',
                jid,
                url: item.url,
                caption: `${item.prompt} (${item.model})`
            };
            try {
                // Works for iframe embed + popup/tab open
                if (window.parent && window.parent !== window) window.parent.postMessage(payload, '*');
                if (window.opener && window.opener !== window) window.opener.postMessage(payload, '*');
                alert('Sent to dashboard. Check WhatsApp send panel.');
            } catch (e) {
                alert('Could not message dashboard.');
            }
        };
    }
    modalRemix.onclick = () => {
        promptInput.value = item.prompt;
        state.prompt = item.prompt;
        imageModal.classList.remove('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };
    imageModal.classList.add('active');
}

async function downloadImage(url, filename) {
    try {
        const response = await fetch(url);
        const blob = await response.blob();
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
    } catch (err) {
        window.open(url, '_blank');
    }
}

init();

    </script>
</body>
