<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mazhar DevX • Elite Control Center v4.0 (CRM)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --bg: #030303;
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #7f00ff;
            --card: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.06);
            --text: #ffffff;
            --muted: #777788;
            --whatsapp: #25d366;
            --danger: #ff4b2b;
            --glow: rgba(0, 242, 254, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 5% 5%, rgba(0, 242, 254, 0.08), transparent 35%),
                radial-gradient(circle at 95% 95%, rgba(127, 0, 255, 0.08), transparent 35%);
        }

        /* Layout */
        .app-shell { display: flex; flex: 1; height: 100vh; width: 100%; }

        .sidebar-contacts {
            width: 350px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(40px);
            z-index: 100;
        }

        .main-chat { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.3); position: relative; }

        /* Typography */
        .brand-section { padding: 35px 30px; border-bottom: 1px solid var(--border); }
        .brand { font-size: 1.8rem; font-weight: 800; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .platform-label { font-size: 0.6rem; letter-spacing: 4px; color: var(--muted); font-weight: 800; margin-top: 5px; }

        /* Contact List */
        .contact-list { flex: 1; overflow-y: auto; padding: 10px; }
        .contact-item {
            display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 18px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; margin-bottom: 5px;
        }
        .contact-item:hover { background: rgba(255,255,255,0.03); }
        .contact-item.active { background: rgba(0, 242, 254, 0.05); border-color: rgba(0, 242, 254, 0.1); }
        
        .contact-avatar { width: 44px; height: 44px; border-radius: 12px; background: var(--card); flex-shrink: 0; overflow: hidden; }
        .contact-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .contact-info { flex: 1; overflow: hidden; }
        .contact-name { font-weight: 700; font-size: 0.9rem; color: #fff; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .contact-status { font-size: 0.7rem; color: var(--muted); }

        /* Chat Feed */
        .chat-header { padding: 30px 40px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .feed { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 20px; }
        
        .msg-row { display: flex; gap: 15px; max-width: 85%; }
        .msg-row.ai { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.whatsapp { align-self: flex-start; }

        .bubble { background: var(--card); border: 1px solid var(--border); padding: 16px 20px; border-radius: 20px; backdrop-filter: blur(10px); max-width: 100%; }
        .ai .bubble { border-right: 3px solid var(--primary); background: rgba(0, 242, 254, 0.02); }
        .whatsapp .bubble { border-left: 3px solid var(--whatsapp); }

        .msg-text { font-size: 0.95rem; line-height: 1.6; color: rgba(255,255,255,0.9); white-space: pre-wrap; }
        .media-box { margin-top: 12px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #000; }
        .media-box img, .media-box video { width: 100%; display: block; max-height: 400px; object-fit: contain; }

        /* Console */
        .console { padding: 25px 40px; background: rgba(0,0,0,0.6); border-top: 1px solid var(--border); display: flex; gap: 15px; backdrop-filter: blur(40px); }
        .input-pill { flex: 1; background: var(--card); border: 1px solid var(--border); padding: 16px 28px; border-radius: 20px; color: #fff; outline: none; font-size: 1rem; }

        /* Overlays */
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(25px); }
        .auth-card { background: #fff; padding: 35px; border-radius: 32px; text-align: center; max-width: 350px; color: #000; }
        .auth-card img { width: 100%; border-radius: 16px; margin: 25px 0; border: 1px solid #eee; }

        /* Buttons */
        .btn { padding: 14px 28px; border-radius: 14px; font-weight: 800; cursor: pointer; border: none; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-red { background: rgba(255,0,0,0.05); color: var(--danger); border: 1px solid var(--danger); }

        @media (max-width: 1000px) {
            .sidebar-contacts { display: none; }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <!-- Sidebar: Conversations -->
        <aside class="sidebar-contacts">
            <div class="brand-section">
                <div class="brand">Elite CRM</div>
                <div class="platform-label">MAZHAR MASTER CONTROL v4.0</div>
            </div>

            <div style="padding: 20px 30px; border-bottom: 1px solid var(--border);">
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
                    <div id="dot" style="width:10px; height:10px; border-radius:50%; background:var(--danger)"></div>
                    <span id="status-text" style="font-size:0.8rem; font-weight:800; color:var(--muted)">DISCONNECTED</span>
                </div>
                <button onclick="logout()" class="btn btn-red" style="width:100%; padding:10px; font-size:0.7rem">Nuke Global Session</button>
            </div>

            <div id="contact-list" class="contact-list">
                <div style="text-align:center; padding:50px; color:var(--muted); font-size:0.8rem">Searching for contacts...</div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main-chat">
            <!-- Auth Overlay -->
            <div id="overlay" class="overlay">
                <div class="auth-card">
                    <h2 style="font-weight:800">LOGIN REQUIRED</h2>
                    <p style="font-size:0.8rem; color:#666; margin-top:5px">Authentication context lost. Scan to restore access.</p>
                    <img id="qr-img" src="/qr-img">
                    <button class="btn btn-primary" style="width:100%" onclick="window.location.href='/download-qr'">Download Access Token</button>
                </div>
            </div>

            <header class="chat-header">
                <div>
                    <h2 id="active-name" style="font-size:1.4rem; font-weight:800">Select a Conversation</h2>
                    <div id="active-jid" style="font-size:0.7rem; color:var(--muted); font-family:monospace">NO ACTIVE TARGET</div>
                </div>
                <div id="chat-controls" style="display:none; gap:10px">
                    <button onclick="toggleAI(false)" class="btn btn-red" style="padding:8px 15px; font-size:0.7rem">Disable AI</button>
                    <button onclick="toggleAI(true)" class="btn btn-primary" style="padding:8px 15px; font-size:0.7rem">Enable AI</button>
                </div>
            </header>

            <div id="feed" class="feed">
                <div style="text-align:center; padding:150px; color:var(--muted)">Select a user from the sidebar to view history.</div>
            </div>

            <div class="console">
                <input type="text" id="reply-input" class="input-pill" placeholder="Select a user to begin bypass...">
                <button id="btn-send" class="btn btn-primary">SEND BYPASS</button>
            </div>
        </main>
    </div>

    <script>
        const socket = io();
        const feed = document.getElementById('feed');
        const contactList = document.getElementById('contact-list');
        const replyInput = document.getElementById('reply-input');
        const btnSend = document.getElementById('btn-send');
        let currentTargetJid = null;
        let contacts = [];

        socket.on('connect_status', (data) => {
            const isOnline = data.status === 'online' || data.status === 'connected';
            document.getElementById('dot').style.background = isOnline ? 'var(--primary)' : 'var(--danger)';
            document.getElementById('status-text').innerText = isOnline ? 'OPERATIONAL' : 'DISCONNECTED';
            document.getElementById('overlay').style.display = isOnline ? 'none' : 'flex';
            if(isOnline) socket.emit('get_contacts');
        });

        socket.on('contact_list', (data) => {
            contacts = data;
            renderContacts();
        });

        function renderContacts() {
            contactList.innerHTML = '';
            if(contacts.length === 0) {
                contactList.innerHTML = '<div style="text-align:center; padding:50px; color:var(--muted); font-size:0.8rem">No previous records found.</div>';
                return;
            }
            contacts.forEach(c => {
                const item = document.createElement('div');
                item.className = `contact-item ${currentTargetJid === c.jid ? 'active' : ''}`;
                item.onclick = () => loadChat(c.jid);
                
                const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(c.jid.split('@')[0])}&background=25d366&color=fff`;
                
                item.innerHTML = `
                    <div class="contact-avatar"><img src="${avatarUrl}"></div>
                    <div class="contact-info">
                        <div class="contact-name">${c.jid.split('@')[0]}</div>
                        <div class="contact-status">Verified History Available</div>
                    </div>
                `;
                contactList.appendChild(item);
            });
        }

        function loadChat(jid) {
            currentTargetJid = jid;
            document.getElementById('active-name').innerText = jid.split('@')[0];
            document.getElementById('active-jid').innerText = jid;
            document.getElementById('chat-controls').style.display = 'flex';
            replyInput.placeholder = `Command bypass to ${jid.split('@')[0]}...`;
            renderContacts();
            socket.emit('load_chat', { jid });
        }

        socket.on('chat_history', (data) => {
            if(data.jid !== currentTargetJid) return;
            feed.innerHTML = '';
            data.history.forEach(msg => {
                if(msg.role === 'system') return;
                appendMessage(msg.role === 'user' ? 'whatsapp' : 'ai', msg.content, msg.timestamp || Date.now());
            });
            feed.scrollTo(0, feed.scrollHeight);
        });

        socket.on('new_message', (data) => {
            if(data.jid === currentTargetJid) {
                appendMessage(data.role === 'whatsapp' ? 'whatsapp' : 'ai', data.text, Date.now(), data.media);
                feed.scrollTo(0, feed.scrollHeight);
            }
            // Update contact list if new user
            if(!contacts.find(c => c.jid === data.jid)) socket.emit('get_contacts');
        });

        function appendMessage(role, text, time, media) {
            const row = document.createElement('div');
            row.className = `msg-row ${role}`;
            
            let mediaHtml = '';
            if (media) {
                if (media.type === 'image') mediaHtml = `<div class="media-box"><img src="${media.url}"></div>`;
                else if (media.type === 'video') mediaHtml = `<div class="media-box"><video src="${media.url}" controls></video></div>`;
            }

            row.innerHTML = `
                <div class="bubble">
                    <div class="msg-text">${text || '<i>[Sent a media object]</i>'}</div>
                    ${mediaHtml}
                    <div style="margin-top:8px; font-size:0.6rem; color:var(--muted); text-align:right">
                        ${new Date(time).toLocaleTimeString()}
                    </div>
                </div>
            `;
            feed.appendChild(row);
        }

        btnSend.onclick = () => {
            const text = replyInput.value.trim();
            if(!text || !currentTargetJid) return alert('Select a target session first.');
            socket.emit('admin_reply', { jid: currentTargetJid, text });
            appendMessage('ai', '👑 [ADMIN BYPASS]: ' + text, Date.now());
            feed.scrollTo(0, feed.scrollHeight);
            replyInput.value = '';
        };

        function toggleAI(status) {
            if(!currentTargetJid) return;
            socket.emit('toggle_ai', { jid: currentTargetJid, status });
            alert(status ? 'AI Re-enabled' : 'AI Silenced for this session.');
        }

        function logout() {
            if(confirm('CRITICAL: Destroy global session data?')) socket.emit('nuke_session');
        }

        socket.on('qr_update', () => {
            document.getElementById('qr-img').src = '/qr-img?t=' + Date.now();
            document.getElementById('overlay').style.display = 'flex';
        });
    </script>
</body>
</html>
