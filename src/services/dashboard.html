<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mazhar DevX • CRM Elite v4.0 (Legacy Soul)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --bg: #010101;
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #7f00ff;
            --card: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --muted: #888899;
            --whatsapp: #25d366;
            --danger: #ff4b2b;
            --glow: rgba(0, 242, 254, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(0, 242, 254, 0.1), transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(127, 0, 255, 0.1), transparent 40%);
        }

        /* App Layout */
        .app-shell { display: flex; flex: 1; height: 100vh; width: 100%; border: 1px solid var(--border); margin: 10px; border-radius: 24px; overflow: hidden; background: rgba(0,0,0,0.5); backdrop-filter: blur(50px); }

        /* Sidebar: Contacts */
        .sidebar {
            width: 380px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.01);
            z-index: 100;
        }

        .main-workspace { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); position: relative; }

        /* Branding */
        .brand-box { padding: 40px 30px; }
        .brand-title { font-size: 2rem; font-weight: 800; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .brand-sub { font-size: 0.65rem; letter-spacing: 5px; color: var(--muted); font-weight: 800; margin-top: 5px; text-transform: uppercase; }

        /* Status Section */
        .system-status { padding: 0 30px 30px; border-bottom: 1px solid var(--border); }
        .status-pill { display: flex; align-items: center; gap: 12px; background: var(--card); padding: 15px 20px; border-radius: 20px; border: 1px solid var(--border); }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 15px var(--danger); transition: 0.3s; }
        .dot.online { background: var(--primary); box-shadow: 0 0 15px var(--primary); }

        /* Contact Items */
        .contacts-scroll { flex: 1; overflow-y: auto; padding: 15px; }
        .contact-card {
            display: flex; align-items: center; gap: 15px; padding: 18px; border-radius: 22px; cursor: pointer; transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid transparent; margin-bottom: 8px;
        }
        .contact-card:hover { background: rgba(255,255,255,0.04); }
        .contact-card.active { background: rgba(0, 242, 254, 0.08); border-color: rgba(0, 242, 254, 0.15); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        .avatar-box { width: 52px; height: 52px; border-radius: 16px; background: var(--card); flex-shrink: 0; overflow: hidden; border: 1px solid var(--border); }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .contact-detail { flex: 1; overflow: hidden; }
        .contact-user { font-weight: 800; font-size: 1rem; color: #fff; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .contact-meta { font-size: 0.75rem; color: var(--muted); font-weight: 600; }

        /* Chat Header */
        .workspace-header { padding: 35px 50px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .chat-target-name { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
        .chat-target-jid { font-size: 0.7rem; color: var(--muted); font-family: monospace; margin-top: 4px; }

        /* Feed */
        .chat-feed { flex: 1; overflow-y: auto; padding: 50px; display: flex; flex-direction: column; gap: 24px; }
        
        .msg-container { display: flex; gap: 18px; max-width: 80%; animation: slideFade 0.4s ease-out; }
        @keyframes slideFade { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-container.ai { align-self: flex-end; flex-direction: row-reverse; }
        .msg-container.whatsapp { align-self: flex-start; }

        .msg-bubble { background: var(--card); border: 1px solid var(--border); padding: 22px 28px; border-radius: 24px; backdrop-filter: blur(15px); position: relative; }
        .ai .msg-bubble { border-right: 4px solid var(--primary); background: rgba(0, 242, 254, 0.03); }
        .whatsapp .msg-bubble { border-left: 4px solid var(--whatsapp); }

        .msg-content { font-size: 1.05rem; line-height: 1.7; color: rgba(255,255,255,0.95); white-space: pre-wrap; font-weight: 400; }
        .media-attachment { margin-top: 18px; border-radius: 18px; overflow: hidden; border: 1px solid var(--border); background: #000; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        .media-attachment img, .media-attachment video { width: 100%; display: block; max-height: 500px; object-fit: contain; }

        /* Input Console */
        .input-console { padding: 30px 50px; background: rgba(0,0,0,0.4); border-top: 1px solid var(--border); display: flex; gap: 20px; align-items: center; }
        .main-input { flex: 1; background: var(--card); border: 1px solid var(--border); padding: 18px 32px; border-radius: 24px; color: #fff; outline: none; font-size: 1.1rem; transition: 0.3s; }
        .main-input:focus { border-color: var(--primary); background: rgba(255,255,255,0.05); }

        /* Overlays */
        .lock-screen { position: absolute; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(30px); }
        .qr-card { background: #fff; padding: 45px; border-radius: 40px; text-align: center; max-width: 400px; color: #000; box-shadow: 0 0 60px rgba(0,242,254,0.15); }
        .qr-card h2 { font-weight: 800; font-size: 1.8rem; margin-bottom: 5px; }
        .qr-card p { font-size: 0.9rem; color: #555; margin-bottom: 30px; }
        .qr-card img { width: 100%; border-radius: 20px; margin-bottom: 30px; border: 1px solid #eee; padding: 10px; }

        /* Buttons */
        .btn { padding: 16px 35px; border-radius: 18px; font-weight: 800; cursor: pointer; border: none; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); letter-spacing: 0.5px; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px var(--glow); }
        .btn-ghost { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); }
        .btn-danger { background: rgba(255, 75, 43, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        @media (max-width: 1100px) {
            .sidebar { width: 320px; }
        }
        @media (max-width: 900px) {
            .sidebar { display: none; }
            .app-shell { margin: 0; border-radius: 0; height: 100vh; }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand-box">
                <div class="brand-title">Elite CRM</div>
                <div class="brand-sub">MAZHAR MASTER CONTROL v4.0</div>
            </div>

            <div class="system-status">
                <div class="status-pill">
                    <div id="status-dot" class="dot"></div>
                    <span id="status-label" style="font-size:0.85rem; font-weight:800; color:var(--muted)">DISCONNECTED</span>
                </div>
            </div>

            <div id="contacts-container" class="contacts-scroll">
                <div style="text-align:center; padding:100px 40px; color:var(--muted); font-size:0.9rem; font-weight:600">Retrieving operational history...</div>
            </div>

            <div style="padding: 24px 30px;">
                 <button onclick="nukeSession()" class="btn btn-danger" style="width:100%; font-size:0.8rem">SYSTEM RESET (NUKE)</button>
            </div>
        </aside>

        <!-- Primary Workspace -->
        <main class="main-workspace">
            <!-- QR Lock Screen -->
            <div id="qr-lock" class="lock-screen">
                <div class="qr-card">
                    <h2>MASTER LINK</h2>
                    <p>Scan the cryptogram to authorize your control center.</p>
                    <img id="qr-display" src="/qr-img">
                    <button class="btn btn-primary" style="width:100%" onclick="window.location.href='/download-qr'">Download QR Key</button>
                    <div style="margin-top:25px; font-size:0.75rem; font-weight:800; color:var(--primary); text-transform:uppercase; letter-spacing:2px">Verifying Connectivity...</div>
                </div>
            </div>

            <header class="workspace-header">
                <div>
                    <h2 id="active-user-name" class="chat-target-name">Select Active Session</h2>
                    <div id="active-user-jid" class="chat-target-jid">OFFLINE CONTEXT</div>
                </div>
                <div id="master-controls" style="display:none; gap:12px">
                    <button id="ai-toggle-btn" class="btn btn-ghost" style="padding:10px 20px; font-size:0.75rem"></button>
                    <button onclick="switchView('settings')" class="btn btn-ghost" style="padding:10px 20px; font-size:0.75rem">Mind Config</button>
                </div>
            </header>

            <div id="chat-feed" class="chat-feed">
                <div style="text-align:center; padding:200px 50px; color:var(--muted); font-weight:600">
                    <div style="font-size:1.5rem; margin-bottom:10px; color:rgba(255,255,255,0.1)">💎</div>
                    Awaiting Selection From Thread Sidebar
                </div>
            </div>

            <div class="input-console">
                <input type="text" id="chat-input" class="main-input" placeholder="Initiate Secure Master Bypass...">
                <button id="send-trigger" class="btn btn-primary">TRANSMIT</button>
            </div>
        </main>
    </div>

    <script>
        const socket = io();
        const feed = document.getElementById('chat-feed');
        const contactList = document.getElementById('contacts-container');
        const mainInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-trigger');
        const qrLock = document.getElementById('qr-lock');
        
        let currentJid = null;
        let knownContacts = [];
        let aiEnabled = true;

        socket.on('connect_status', (data) => {
            const isOnline = data.status === 'online' || data.status === 'connected';
            document.getElementById('status-dot').className = `dot ${isOnline ? 'online' : ''}`;
            document.getElementById('status-label').innerText = isOnline ? 'OPERATIONAL' : 'OFFLINE';
            qrLock.style.display = isOnline ? 'none' : 'flex';
            if(isOnline) socket.emit('get_contacts');
        });

        socket.on('contact_list', (data) => {
            knownContacts = data;
            renderContacts();
        });

        function renderContacts() {
            contactList.innerHTML = '';
            if(knownContacts.length === 0) {
                contactList.innerHTML = '<div style="text-align:center; padding:100px 40px; color:var(--muted); font-size:0.85rem">No verified traffic found.</div>';
                return;
            }
            knownContacts.forEach(c => {
                const card = document.createElement('div');
                card.className = `contact-card ${currentJid === c.jid ? 'active' : ''}`;
                card.onclick = () => selectThread(c.jid);
                
                const avatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(c.jid.split('@')[0])}&background=25d366&color=fff&bold=true`;
                
                card.innerHTML = `
                    <div class="avatar-box"><img src="${avatar}"></div>
                    <div class="contact-detail">
                        <div class="contact-user">${c.jid.split('@')[0]}</div>
                        <div class="contact-meta">v4.0 Protocol Verified</div>
                    </div>
                `;
                contactList.appendChild(card);
            });
        }

        function selectThread(jid) {
            currentJid = jid;
            document.getElementById('active-user-name').innerText = jid.split('@')[0];
            document.getElementById('active-user-jid').innerText = jid;
            document.getElementById('master-controls').style.display = 'flex';
            document.getElementById('ai-toggle-btn').innerText = 'MANUAL MODE ON';
            mainInput.placeholder = `Bypass protocol to ${jid.split('@')[0]}...`;
            renderContacts();
            socket.emit('load_chat', { jid });
        }

        socket.on('chat_history', (data) => {
            if(data.jid !== currentJid) return;
            feed.innerHTML = '';
            data.history.forEach(msg => {
                if(msg.role === 'system') return;
                appendBubble(msg.role === 'user' ? 'whatsapp' : 'ai', msg.content, msg.timestamp);
            });
            feed.scrollTo(0, feed.scrollHeight);
        });

        socket.on('new_message', (data) => {
            if(data.jid === currentJid) {
                appendBubble(data.role === 'whatsapp' ? 'whatsapp' : 'ai', data.text, Date.now(), data.media);
                feed.scrollTo(0, feed.scrollHeight);
            }
            if(!knownContacts.find(c => c.jid === data.jid)) socket.emit('get_contacts');
        });

        function appendBubble(role, text, time, media) {
            const container = document.createElement('div');
            container.className = `msg-container ${role}`;
            
            let mediaMarkup = '';
            if (media) {
                if (media.type === 'image') mediaMarkup = `<div class="media-attachment"><img src="${media.url}"></div>`;
                else if (media.type === 'video') mediaMarkup = `<div class="media-attachment"><video src="${media.url}" controls></video></div>`;
            }

            container.innerHTML = `
                <div class="msg-bubble">
                    <div class="msg-content">${text || '<i>[Transmitted Media Asset]</i>'}</div>
                    ${mediaMarkup}
                    <div style="margin-top:12px; font-size:0.65rem; color:var(--muted); text-align:right; font-weight:700">
                        ${new Date(time).toLocaleTimeString()}
                    </div>
                </div>
            `;
            feed.appendChild(container);
        }

        sendBtn.onclick = () => {
            const text = mainInput.value.trim();
            if(!text || !currentJid) return;
            socket.emit('admin_reply', { jid: currentJid, text });
            appendBubble('ai', '👑 MASTER BYPASS: ' + text, Date.now());
            feed.scrollTo(0, feed.scrollHeight);
            mainInput.value = '';
        };

        function nukeSession() {
            if(confirm('TERMINATE ALL OPERATIONAL CONTEXT?')) socket.emit('nuke_session');
        }

        socket.on('qr_update', () => {
            document.getElementById('qr-display').src = '/qr-img?t=' + Date.now();
            qrLock.style.display = 'flex';
        });
    </script>
</body>
</html>
